# psync configuration
# All values are optional — uncomment to override defaults.

# [connection]
# host = pixel-8
# port = 8022
# base_path = /data/data/com.termux/files/home/storage/shared

# [directories]
# Override local or remote paths per directory.
# Remote paths are relative to base_path unless they start with /.
# audio_local = ~/d/audio
# audio_remote = Music
# images_local = ~/d/images
# images_remote = DCIM
# notes_local = ~/d/notes
# notes_remote = Notes
# other_local = ~/d/other
# other_remote = Other
# screenshots_local = ~/d/images/screenshots
# screenshots_remote = Pictures/Screenshots
# video_local = ~/d/video
# video_remote = Movies
