# Disable Bluetooth hardware (absolute) volume.
#
# Some BT headsets (e.g. Nothing Headphone (1)) mishandle AVRCP/LE absolute
# volume: only mute/0% register, while every other percentage maps to the same
# internal level. Forcing software volume makes intermediate levels work again.
#
# The empty hw-volume list means NO Bluetooth profile uses hardware volume, so
# PipeWire scales the audio in software instead.
monitor.bluez.properties = {
  bluez5.enable-hw-volume = false
  bluez5.hw-volume = [ ]
}
