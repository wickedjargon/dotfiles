# Declarative definition of the "archbox" Distrobox container.
#
# Rebuild the container with:
#     ./scripts/create-archbox.sh
# or directly:
#     distrobox assemble create --file packages/archbox.ini
#
# This file captures the *container shape* (image + bootstrap). Packages and
# app configuration are applied AFTER creation by entering the container and
# running scripts/install_arch_packages.py and scripts/setup-steam.sh.
# (The package install must run as your user, not root, so it cannot live in
# init_hooks here.)

[archbox]
image=docker.io/library/archlinux:latest
pull=true
# Pre-seed only what the post-create installers need to bootstrap yay/makepkg.
additional_packages=base-devel git sudo python openssh
# Enable [multilib] up front so Steam's lib32-* deps can be installed later.
init_hooks=sed -i '/^#\[multilib\]/,/^#Include/ s/^#//' /etc/pacman.conf; pacman -Sy --noconfirm
